<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python sandbox</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/@tabler/icons-webfont/2.47.0/tabler-icons.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0F1115;
    min-height: 100vh;
    padding: 20px 24px;
    font-family: 'Inter', sans-serif;
  }
  #wrap { width: 100%; max-width: none; margin: 0 auto; }
  #pageTitle {
    color: #E8E6E1;
    font-size: 15px;
    font-weight: 500;
    margin: 0 0 12px 2px;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.35; } }
  textarea:focus, button:focus, select:focus { outline: 2px solid #E8A33D; outline-offset: 1px; }
  .CodeMirror {
    height: 100%;
    width: 100%;
    background: #1A1D23 !important;
    color: #E8E6E1 !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 13.5px !important;
    line-height: 1.6 !important;
  }
  .CodeMirror-scroll {
    width: 100%;
    overflow-x: auto !important;
  }
  .CodeMirror-sizer { min-width: 0 !important; }
  #editorPaneWrap {
    flex: 1 1 0%;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }
  .CodeMirror-gutters { background: #1A1D23 !important; border-right: none !important; }
  .CodeMirror-linenumber { color: #4A4D55 !important; }
  .CodeMirror-cursor { border-left: 2px solid #E8A33D !important; }
  .CodeMirror-selected { background: #3D5A80 !important; }
  .CodeMirror-focused .CodeMirror-selected { background: #3D5A80 !important; }
  .cm-searching, .CodeMirror ::selection { background: #3D5A80 !important; }
  .CodeMirror-line::selection, .CodeMirror-line > span::selection, .CodeMirror-line > span > span::selection {
    background: #3D5A80 !important;
  }
  .CodeMirror-matchingbracket { color: #6FCF8F !important; background: #2A3F33; }
  .cm-keyword { color: #E8A33D !important; }
  .cm-def { color: #7DB8E8 !important; }
  .cm-string, .cm-string-2 { color: #9FCF6F !important; }
  .cm-number { color: #D89FE8 !important; }
  .cm-comment { color: #6E6C66 !important; font-style: italic; }
  .cm-variable { color: #E8E6E1 !important; }
  .cm-operator { color: #C9C7C0 !important; }
  .CodeMirror-hints {
    background: #22262E !important;
    border: 0.5px solid #3A3E47 !important;
    color: #C9C7C0 !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 13px !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4) !important;
  }
  .CodeMirror-hint { padding: 4px 10px !important; }
  li.CodeMirror-hint-active {
    background: #E8A33D !important;
    color: #1A1D23 !important;
  }
  .cm-hint-type { color: #6E6C66; font-size: 11px; float: right; margin-left: 12px; }
  .CodeMirror pre.CodeMirror-line { position: relative; }
  .cm-indent-dots {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    pointer-events: none;
    background-image: radial-gradient(circle, #6B7280 1px, transparent 1.4px);
    background-repeat: repeat-x;
    background-position: center center;
  }
  @media (max-width: 640px) {
    #splitArea { flex-direction: column; min-height: auto !important; }
    #splitArea > div:first-child { border-right: none !important; border-bottom: 0.5px solid #2E323B !important; min-height: 300px; }
    #splitArea > div:last-child { min-height: 240px; }
  }
</style>
</head>
<body>
<div id="wrap">
  <p id="pageTitle">Python sandbox <span style="color:#6E6C66; font-weight:400;">— runs real CPython in your browser via Pyodide</span></p>

  <div id="root" style="background: #1A1D23; border-radius: 12px; overflow: hidden; border: 0.5px solid #2E323B;">

    <!-- Toolbar -->
    <div style="display:flex; align-items:center; gap:10px; padding:10px 14px; background:#1E2128; border-bottom:0.5px solid #2E323B; flex-wrap:wrap;">
      <button id="runBtn" style="display:flex; align-items:center; gap:6px; background:#E8A33D; color:#1A1D23; border:none; border-radius:6px; padding:7px 14px; font-weight:500; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;">
        <i class="ti ti-player-play" style="font-size:15px;" aria-hidden="true"></i>
        <span id="runLabel">Run</span>
      </button>
      <button id="clearBtn" style="display:flex; align-items:center; gap:6px; background:transparent; color:#9A9890; border:0.5px solid #3A3E47; border-radius:6px; padding:7px 12px; font-weight:500; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;">
        <i class="ti ti-eraser" style="font-size:15px;" aria-hidden="true"></i> Clear output
      </button>

      <div style="width:1px; height:20px; background:#3A3E47; margin:0 2px;"></div>

      <select id="snippetSelect" style="background:#22262E; color:#C9C7C0; border:0.5px solid #3A3E47; border-radius:6px; padding:7px 8px; font-size:13px; font-family:'Inter',sans-serif; max-width:160px;">
        <option value="">Saved snippets…</option>
      </select>
      <button id="saveBtn" style="display:flex; align-items:center; gap:6px; background:transparent; color:#9A9890; border:0.5px solid #3A3E47; border-radius:6px; padding:7px 12px; font-weight:500; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;">
        <i class="ti ti-device-floppy" style="font-size:15px;" aria-hidden="true"></i> Save as…
      </button>
      <button id="deleteBtn" style="display:none; align-items:center; gap:6px; background:transparent; color:#E07856; border:0.5px solid #4A332C; border-radius:6px; padding:7px 10px; font-weight:500; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;">
        <i class="ti ti-trash" style="font-size:15px;" aria-hidden="true"></i>
      </button>

      <div style="width:1px; height:20px; background:#3A3E47; margin:0 2px;"></div>

      <div id="timerWrap" style="display:flex; align-items:center; gap:6px;">
        <span id="timerDisplay" style="font-family:'JetBrains Mono', monospace; font-size:13px; color:#9A9890; min-width:52px;">00:00</span>
        <button id="timerToggleBtn" aria-label="Start timer" style="display:flex; align-items:center; justify-content:center; background:transparent; color:#9A9890; border:0.5px solid #3A3E47; border-radius:6px; padding:6px 8px; cursor:pointer;">
          <i class="ti ti-player-play" id="timerToggleIcon" style="font-size:14px;" aria-hidden="true"></i>
        </button>
        <button id="timerResetBtn" aria-label="Reset timer" style="display:flex; align-items:center; justify-content:center; background:transparent; color:#9A9890; border:0.5px solid #3A3E47; border-radius:6px; padding:6px 8px; cursor:pointer;">
          <i class="ti ti-refresh" style="font-size:14px;" aria-hidden="true"></i>
        </button>
      </div>

      <div style="flex:1;"></div>

      <div id="statusPill" style="display:flex; align-items:center; gap:6px; font-size:12px; color:#9A9890; font-family:'Inter',sans-serif;">
        <span id="statusDot" style="width:7px; height:7px; border-radius:50%; background:#E8A33D; display:inline-block;"></span>
        <span id="statusText">Booting Python…</span>
        <button id="retryBtn" style="display:none; align-items:center; gap:4px; background:transparent; color:#E8A33D; border:0.5px solid #4A3A1F; border-radius:6px; padding:4px 10px; font-weight:500; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; margin-left:4px;">
          <i class="ti ti-refresh" style="font-size:13px;" aria-hidden="true"></i> Retry
        </button>
      </div>
    </div>

    <!-- Split panes -->
    <div id="splitArea" style="display:flex; min-height:calc(100vh - 130px);">
      <div style="flex:1.3 1 0%; display:flex; flex-direction:column; min-width:0; border-right:0.5px solid #2E323B;">
        <div style="font-size:11px; color:#6E6C66; padding:8px 14px 4px; letter-spacing:0.04em; text-transform:uppercase; font-family:'Inter',sans-serif;">Editor</div>
        <div id="editorPaneWrap">
          <textarea id="editor" spellcheck="false"></textarea>
        </div>
      </div>
      <div style="flex:1 1 0%; display:flex; flex-direction:column; min-width:0;">
        <div style="font-size:11px; color:#6E6C66; padding:8px 14px 4px; letter-spacing:0.04em; text-transform:uppercase; font-family:'Inter',sans-serif; display:flex; justify-content:space-between; align-items:center;">
          <span>Console</span>
          <span id="execTime" style="color:#6E6C66;"></span>
        </div>

        <!-- REPL prompt: type Python here, runs against the same
             interpreter/namespace as the editor's Run button -->
        <div style="display:flex; align-items:center; gap:6px; padding:6px 14px; border-bottom:0.5px solid #2E323B;">
          <span style="color:#E8A33D; font-family:'JetBrains Mono', monospace; font-size:13px;">&gt;&gt;&gt;</span>
          <input id="replInput" type="text" spellcheck="false" autocomplete="off" placeholder="Waiting for Python to start…" style="flex:1; background:transparent; border:none; outline:none; color:#E8E6E1; font-family:'JetBrains Mono', monospace; font-size:13px;">
        </div>

        <div id="output" style="flex:1; padding:8px 14px 14px; font-family:'JetBrains Mono', monospace; font-size:13.5px; line-height:1.6; color:#C9C7C0; overflow:auto; white-space:pre-wrap; word-break:break-word; min-height:0;"></div>
      </div>
    </div>
  </div>

  <p style="color:#5A584F; font-size:12px; margin:10px 2px 0;">Code autosaves to this browser. Type any command in the console below — build objects, call functions, inspect values. Shortcuts: Cmd/Ctrl+Enter to run, Ctrl+Space for suggestions.</p>
</div>

<script src="./pyodide/pyodide.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/anyword-hint.min.js"></script>
<script>
(function() {
  const editorEl = document.getElementById('editor');
  const output = document.getElementById('output');
  const runBtn = document.getElementById('runBtn');
  const runLabel = document.getElementById('runLabel');
  const clearBtn = document.getElementById('clearBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const execTime = document.getElementById('execTime');
  const snippetSelect = document.getElementById('snippetSelect');
  const saveBtn = document.getElementById('saveBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const retryBtn = document.getElementById('retryBtn');

  const STORAGE_PREFIX = 'pysandbox:';
  const BUFFER_KEY = STORAGE_PREFIX + 'buffer:current';
  const SNIPPET_PREFIX = STORAGE_PREFIX + 'snippet:';

  const DEFAULT_CODE = `# Python sandbox — runs for real, right here in the browser.
# Try it:

def fib(n):
    a, b = 0, 1
    for _ in range(n):
        a, b = b, a + b
    return a

print("First 10 Fibonacci numbers:")
print([fib(i) for i in range(10)])
`;

  // --- Python-aware autocomplete ---
  // CodeMirror 5 ships no official python-hint addon, so we build a small
  // one: a curated list of keywords + builtins, merged with identifiers
  // already typed in the buffer (so your own function/variable names
  // show up too).
  const PY_KEYWORDS = [
    'False','None','True','and','as','assert','async','await','break','class',
    'continue','def','del','elif','else','except','finally','for','from',
    'global','if','import','in','is','lambda','nonlocal','not','or','pass',
    'raise','return','try','while','with','yield'
  ];
  const PY_BUILTINS = [
    'abs','aiter','anext','all','any','ascii','bin','bool','breakpoint',
    'bytearray','bytes','callable','chr','classmethod','compile','complex',
    'delattr','dict','dir','divmod','enumerate','eval','exec','filter',
    'float','format','frozenset','getattr','globals','hasattr','hash',
    'help','hex','id','input','int','isinstance','issubclass','iter','len',
    'list','locals','map','max','min','next','object','oct','open','ord',
    'pow','print','property','range','repr','reversed','round','set',
    'setattr','slice','sorted','staticmethod','str','sum','super','tuple',
    'type','vars','zip','self','__init__','__name__','__main__'
  ];
  const PY_WORDS = PY_KEYWORDS.concat(PY_BUILTINS);

  function pythonHint(cm) {
    const cursor = cm.getCursor();
    const line = cm.getLine(cursor.line);
    let start = cursor.ch, end = cursor.ch;
    while (start && /[\w]/.test(line.charAt(start - 1))) start--;
    while (end < line.length && /[\w]/.test(line.charAt(end))) end++;
    const word = line.slice(start, end);

    if (!word) return null;

    // Pull identifiers already used anywhere in the buffer
    const fullText = cm.getValue();
    const identifierMatches = fullText.match(/[A-Za-z_][A-Za-z0-9_]*/g) || [];
    const userWords = Array.from(new Set(identifierMatches));

    const pool = Array.from(new Set(PY_WORDS.concat(userWords)));
    const matches = pool
      .filter(w => w.toLowerCase().startsWith(word.toLowerCase()) && w !== word)
      .sort((a, b) => {
        // Keywords/builtins first, then alphabetical
        const aIsCore = PY_WORDS.includes(a);
        const bIsCore = PY_WORDS.includes(b);
        if (aIsCore !== bIsCore) return aIsCore ? -1 : 1;
        return a.localeCompare(b);
      });

    if (!matches.length) return null;

    return {
      list: matches,
      from: CodeMirror.Pos(cursor.line, start),
      to: CodeMirror.Pos(cursor.line, end)
    };
  }

  // CodeMirror: real syntax highlighting, auto-indent after colons,
  // smart dedent, matching/auto-closing brackets — everything a plain
  // textarea can't do.
  const editor = CodeMirror.fromTextArea(editorEl, {
    mode: 'python',
    theme: 'dracula',
    lineNumbers: true,
    indentUnit: 4,
    tabSize: 4,
    indentWithTabs: false,
    smartIndent: true,
    electricChars: true,
    matchBrackets: true,
    autoCloseBrackets: true,
    styleActiveLine: true,
    hintOptions: { hint: pythonHint, completeSingle: false },
    extraKeys: {
      'Tab': function(cm) {
        // Insert 4 spaces instead of a literal tab character
        cm.replaceSelection('    ', 'end');
      },
      'Shift-Tab': 'indentLess',
      'Cmd-Enter': function() { runCode(); },
      'Ctrl-Enter': function() { runCode(); },
      'Ctrl-Space': function(cm) { cm.showHint(); }
    }
  });

  // Auto-trigger suggestions while typing a word (not after every
  // keystroke — only when there's a real word being built, and skip
  // it right after autocomplete just inserted something).
  editor.on('inputRead', function(cm, change) {
    if (change.origin !== '+input') return;
    const cursor = cm.getCursor();
    const line = cm.getLine(cursor.line);
    const charBefore = line.charAt(cursor.ch - 1);
    if (!/[\w]/.test(charBefore)) return;
    // Find how long the current word is so far
    let start = cursor.ch;
    while (start && /[\w]/.test(line.charAt(start - 1))) start--;
    if (cursor.ch - start < 2) return; // wait for at least 2 characters
    cm.showHint({ hint: pythonHint, completeSingle: false });
  });

  // --- Indent guides ---
  // Draws a faint vertical line at each indentation level so nested
  // for/if/def blocks are easy to trace visually. CodeMirror has no
  // built-in option for this, so we hook the renderLine event and add
  // one absolutely-positioned div per indent level, sized from the
  // character width CodeMirror reports for this font.
  editor.on('renderLine', function(cm, line, el) {
    const text = line.text;
    const leadingSpaces = (text.match(/^ */) || [''])[0].length;

    // Remove any guide from a previous render of this line
    const old = el.querySelector('.cm-indent-dots');
    if (old) old.remove();
    if (leadingSpaces < 1) return;

    const charWidth = cm.defaultCharWidth();
    const dotLayer = document.createElement('div');
    dotLayer.className = 'cm-indent-dots';
    dotLayer.style.width = (leadingSpaces * charWidth) + 'px';
    // One dot centered in the middle of every 4th character cell
    // (i.e. one per indent level), matching indentUnit: 4.
    dotLayer.style.backgroundSize = (charWidth * 4) + 'px 100%';
    el.appendChild(dotLayer);
  });

  // Note: renderLine fires automatically whenever a line's content or
  // visible state changes, so no manual refresh-on-every-keystroke is
  // needed here — that would be expensive and cause visible flicker.

  function setStatus(text, color) {
    statusText.textContent = text;
    statusDot.style.background = color;
  }

  function appendOutput(text, color) {
    const span = document.createElement('span');
    span.textContent = text;
    if (color) span.style.color = color;
    output.appendChild(span);
    output.scrollTop = output.scrollHeight;
  }

  let pyodide = null;
  let autosaveTimer = null;

  async function boot() {
    retryBtn.style.display = 'none';
    setStatus('Booting Python…', '#E8A33D');
    statusDot.style.animation = 'pulse 1.2s ease-in-out infinite';

    try {
      pyodide = await loadPyodide({
        indexURL: "./pyodide/"
      });
      pyodide.setStdout({ batched: (s) => appendOutput(s + '\n') });
      pyodide.setStderr({ batched: (s) => appendOutput(s + '\n', '#E07856') });
      setStatus('Ready', '#6FCF8F');
      statusDot.style.animation = 'none';
      runBtn.disabled = false;
      replInput.placeholder = 'Type Python and press Enter…';
    } catch (err) {
      setStatus('Failed to load Python', '#E07856');
      statusDot.style.animation = 'none';
      retryBtn.style.display = 'flex';
      appendOutput('Could not load the Python runtime.\n\nDetails: ' + (err && (err.stack || err.message || err)) + '\n\nThe pyodide/ folder may be missing a file. Click Retry, or re-check that all 5 files were uploaded to the pyodide/ folder.', '#E07856');
      console.error('Pyodide load error:', err);
    }
  }

  retryBtn.addEventListener('click', boot);

  async function runCode() {
    if (!pyodide) {
      appendOutput('Python is still starting up — try again in a moment.', '#E8A33D');
      return;
    }
    output.textContent = '';
    execTime.textContent = '';
    runLabel.textContent = 'Running…';
    runBtn.disabled = true;
    setStatus('Running…', '#E8A33D');
    statusDot.style.animation = 'pulse 0.8s ease-in-out infinite';

    const code = editor.getValue();
    const start = performance.now();
    try {
      let result = await pyodide.runPythonAsync(code);
      const elapsed = Math.round(performance.now() - start);
      execTime.textContent = 'ran in ' + elapsed + 'ms';
      if (result !== undefined && result !== null && output.textContent === '') {
        appendOutput(String(result), '#9A9890');
      }
      setStatus('Ready', '#6FCF8F');
    } catch (err) {
      const elapsed = Math.round(performance.now() - start);
      execTime.textContent = 'failed after ' + elapsed + 'ms';
      appendOutput(String(err.message || err), '#E07856');
      setStatus('Error', '#E07856');
    } finally {
      statusDot.style.animation = 'none';
      runLabel.textContent = 'Run';
      runBtn.disabled = false;
    }
  }

  runBtn.addEventListener('click', runCode);
  clearBtn.addEventListener('click', () => { output.textContent = ''; execTime.textContent = ''; });

  // --- Interactive REPL ---
  // Lets you type Python directly into the console and run it against
  // the same Pyodide namespace the Run button uses — so anything you
  // defined by running the editor (classes, variables, functions) is
  // still available here. Unlike Run, this never clears prior output.
  const replInput = document.getElementById('replInput');
  const replHistory = [];
  let replHistoryIndex = -1;

  function appendReplLine(text, color) {
    const line = document.createElement('div');
    const prompt = document.createElement('span');
    prompt.textContent = '>>> ';
    prompt.style.color = '#E8A33D';
    line.appendChild(prompt);
    const rest = document.createElement('span');
    rest.textContent = text;
    if (color) rest.style.color = color;
    line.appendChild(rest);
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
  }

  async function runReplLine(line) {
    if (!pyodide) {
      appendOutput('Python is still starting up — try again in a moment.', '#E8A33D');
      return;
    }
    appendReplLine(line);

    const trimmed = line.trim();
    const isAssert = /^assert\s+/.test(trimmed);

    try {
      if (isAssert) {
        // Run as a boolean check instead of a literal assert, so a
        // failure shows a clean ✗ here too, instead of a raw
        // AssertionError traceback.
        const checkExpr = trimmed.replace(/^assert\s+/, '');
        const passed = await pyodide.runPythonAsync(`bool(${checkExpr})`);
        if (passed) {
          appendOutput('✓ Passed', '#6FCF8F');
        } else {
          appendOutput('✗ Failed', '#E07856');
        }
      } else {
        const result = await pyodide.runPythonAsync(line);
        if (result !== undefined && result !== null) {
          appendOutput(String(result), '#9A9890');
        }
      }
    } catch (err) {
      appendOutput(String(err.message || err), '#E07856');
    }
    output.scrollTop = output.scrollHeight;
  }

  replInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const line = replInput.value;
      if (!line.trim()) return;
      replHistory.push(line);
      replHistoryIndex = replHistory.length;
      replInput.value = '';
      runReplLine(line);
    } else if (e.key === 'ArrowUp') {
      if (replHistory.length === 0) return;
      e.preventDefault();
      replHistoryIndex = Math.max(0, replHistoryIndex - 1);
      replInput.value = replHistory[replHistoryIndex] || '';
    } else if (e.key === 'ArrowDown') {
      if (replHistory.length === 0) return;
      e.preventDefault();
      replHistoryIndex = Math.min(replHistory.length, replHistoryIndex + 1);
      replInput.value = replHistory[replHistoryIndex] || '';
    }
  });

  // --- Persistence (localStorage — this is a standalone page now) ---
  function loadBuffer() {
    try {
      const v = localStorage.getItem(BUFFER_KEY);
      editor.setValue(v !== null ? v : DEFAULT_CODE);
    } catch {
      editor.setValue(DEFAULT_CODE);
    }
  }

  function scheduleAutosave() {
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(() => {
      try { localStorage.setItem(BUFFER_KEY, editor.getValue()); } catch {}
    }, 600);
  }
  editor.on('change', scheduleAutosave);

  function refreshSnippetList() {
    snippetSelect.innerHTML = '<option value="">Saved snippets…</option>';
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(SNIPPET_PREFIX)) {
          const name = k.slice(SNIPPET_PREFIX.length);
          const opt = document.createElement('option');
          opt.value = k;
          opt.textContent = name;
          snippetSelect.appendChild(opt);
        }
      }
    } catch {}
  }

  snippetSelect.addEventListener('change', () => {
    const key = snippetSelect.value;
    deleteBtn.style.display = key ? 'flex' : 'none';
    if (!key) return;
    try {
      const v = localStorage.getItem(key);
      if (v !== null) {
        editor.setValue(v);
        scheduleAutosave();
      }
    } catch {}
  });

  saveBtn.addEventListener('click', () => {
    const name = prompt('Save this snippet as:');
    if (!name) return;
    try {
      localStorage.setItem(SNIPPET_PREFIX + name, editor.getValue());
      refreshSnippetList();
      snippetSelect.value = SNIPPET_PREFIX + name;
      deleteBtn.style.display = 'flex';
    } catch {
      appendOutput('Could not save snippet (storage may be full or blocked).', '#E07856');
    }
  });

  deleteBtn.addEventListener('click', () => {
    const key = snippetSelect.value;
    if (!key) return;
    if (!confirm('Delete this saved snippet?')) return;
    try {
      localStorage.removeItem(key);
      refreshSnippetList();
      deleteBtn.style.display = 'none';
    } catch {}
  });

  // --- Timer ---
  const timerDisplay = document.getElementById('timerDisplay');
  const timerToggleBtn = document.getElementById('timerToggleBtn');
  const timerToggleIcon = document.getElementById('timerToggleIcon');
  const timerResetBtn = document.getElementById('timerResetBtn');
  let timerSeconds = 0;
  let timerInterval = null;
  let timerRunning = false;

  function formatTime(totalSeconds) {
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function updateTimerDisplay() {
    timerDisplay.textContent = formatTime(timerSeconds);
  }

  function toggleTimer() {
    if (timerRunning) {
      clearInterval(timerInterval);
      timerRunning = false;
      timerToggleIcon.className = 'ti ti-player-play';
      timerToggleBtn.setAttribute('aria-label', 'Start timer');
    } else {
      timerInterval = setInterval(() => {
        timerSeconds++;
        updateTimerDisplay();
      }, 1000);
      timerRunning = true;
      timerToggleIcon.className = 'ti ti-player-pause';
      timerToggleBtn.setAttribute('aria-label', 'Pause timer');
    }
  }

  timerToggleBtn.addEventListener('click', toggleTimer);
  timerResetBtn.addEventListener('click', () => {
    clearInterval(timerInterval);
    timerRunning = false;
    timerSeconds = 0;
    timerToggleIcon.className = 'ti ti-player-play';
    timerToggleBtn.setAttribute('aria-label', 'Start timer');
    updateTimerDisplay();
  });

  // --- Init ---
  loadBuffer();
  refreshSnippetList();
  boot();
  editor.refresh();
  window.addEventListener('resize', () => editor.refresh());
})();
</script>
</body>
</html>
