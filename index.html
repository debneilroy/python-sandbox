<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python sandbox</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/@tabler/icons-webfont/2.47.0/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0F1115;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: 'Inter', sans-serif;
  }
  #wrap { width: 100%; max-width: 1100px; }
  #pageTitle {
    color: #E8E6E1;
    font-size: 15px;
    font-weight: 500;
    margin: 0 0 12px 2px;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.35; } }
  textarea:focus, button:focus, select:focus { outline: 2px solid #E8A33D; outline-offset: 1px; }
  @media (max-width: 640px) {
    #splitArea { flex-direction: column; }
    #splitArea > div:first-child { border-right: none !important; border-bottom: 0.5px solid #2E323B !important; min-height: 260px; }
    #splitArea > div:last-child { min-height: 200px; }
  }
</style>
</head>
<body>
<div id="wrap">
  <p id="pageTitle">Python sandbox <span style="color:#6E6C66; font-weight:400;">— runs real CPython in your browser via Pyodide</span></p>

  <div id="root" style="background: #1A1D23; border-radius: 12px; overflow: hidden; border: 0.5px solid #2E323B;">

    <!-- Toolbar -->
    <div style="display:flex; align-items:center; gap:10px; padding:10px 14px; background:#1E2128; border-bottom:0.5px solid #2E323B; flex-wrap:wrap;">
      <button id="runBtn" style="display:flex; align-items:center; gap:6px; background:#E8A33D; color:#1A1D23; border:none; border-radius:6px; padding:7px 14px; font-weight:500; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;">
        <i class="ti ti-player-play" style="font-size:15px;" aria-hidden="true"></i>
        <span id="runLabel">Run</span>
      </button>
      <button id="clearBtn" style="display:flex; align-items:center; gap:6px; background:transparent; color:#9A9890; border:0.5px solid #3A3E47; border-radius:6px; padding:7px 12px; font-weight:500; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;">
        <i class="ti ti-eraser" style="font-size:15px;" aria-hidden="true"></i> Clear output
      </button>

      <div style="width:1px; height:20px; background:#3A3E47; margin:0 2px;"></div>

      <select id="snippetSelect" style="background:#22262E; color:#C9C7C0; border:0.5px solid #3A3E47; border-radius:6px; padding:7px 8px; font-size:13px; font-family:'Inter',sans-serif; max-width:160px;">
        <option value="">Saved snippets…</option>
      </select>
      <button id="saveBtn" style="display:flex; align-items:center; gap:6px; background:transparent; color:#9A9890; border:0.5px solid #3A3E47; border-radius:6px; padding:7px 12px; font-weight:500; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;">
        <i class="ti ti-device-floppy" style="font-size:15px;" aria-hidden="true"></i> Save as…
      </button>
      <button id="deleteBtn" style="display:none; align-items:center; gap:6px; background:transparent; color:#E07856; border:0.5px solid #4A332C; border-radius:6px; padding:7px 10px; font-weight:500; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;">
        <i class="ti ti-trash" style="font-size:15px;" aria-hidden="true"></i>
      </button>

      <div style="flex:1;"></div>

      <div id="statusPill" style="display:flex; align-items:center; gap:6px; font-size:12px; color:#9A9890; font-family:'Inter',sans-serif;">
        <span id="statusDot" style="width:7px; height:7px; border-radius:50%; background:#E8A33D; display:inline-block;"></span>
        <span id="statusText">Booting Python…</span>
        <button id="retryBtn" style="display:none; align-items:center; gap:4px; background:transparent; color:#E8A33D; border:0.5px solid #4A3A1F; border-radius:6px; padding:4px 10px; font-weight:500; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; margin-left:4px;">
          <i class="ti ti-refresh" style="font-size:13px;" aria-hidden="true"></i> Retry
        </button>
      </div>
    </div>

    <!-- Split panes -->
    <div id="splitArea" style="display:flex; min-height:420px;">
      <div style="flex:1.3; display:flex; flex-direction:column; min-width:0; border-right:0.5px solid #2E323B;">
        <div style="font-size:11px; color:#6E6C66; padding:8px 14px 4px; letter-spacing:0.04em; text-transform:uppercase; font-family:'Inter',sans-serif;">Editor</div>
        <textarea id="editor" spellcheck="false" style="flex:1; background:#1A1D23; color:#E8E6E1; border:none; outline:none; resize:none; padding:4px 14px 14px; font-family:'JetBrains Mono', monospace; font-size:13.5px; line-height:1.6; tab-size:4; white-space:pre; overflow:auto;"></textarea>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
        <div style="font-size:11px; color:#6E6C66; padding:8px 14px 4px; letter-spacing:0.04em; text-transform:uppercase; font-family:'Inter',sans-serif; display:flex; justify-content:space-between;">
          <span>Console</span>
          <span id="execTime" style="color:#6E6C66;"></span>
        </div>
        <div id="output" style="flex:1; padding:4px 14px 14px; font-family:'JetBrains Mono', monospace; font-size:13.5px; line-height:1.6; color:#C9C7C0; overflow:auto; white-space:pre-wrap; word-break:break-word;"></div>
      </div>
    </div>
  </div>

  <p style="color:#5A584F; font-size:12px; margin:10px 2px 0;">Code autosaves to this browser. Use "Save as…" to keep named snippets. Shortcut: Cmd/Ctrl+Enter to run.</p>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
<script>
(function() {
  const editor = document.getElementById('editor');
  const output = document.getElementById('output');
  const runBtn = document.getElementById('runBtn');
  const runLabel = document.getElementById('runLabel');
  const clearBtn = document.getElementById('clearBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const execTime = document.getElementById('execTime');
  const snippetSelect = document.getElementById('snippetSelect');
  const saveBtn = document.getElementById('saveBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const retryBtn = document.getElementById('retryBtn');

  const STORAGE_PREFIX = 'pysandbox:';
  const BUFFER_KEY = STORAGE_PREFIX + 'buffer:current';
  const SNIPPET_PREFIX = STORAGE_PREFIX + 'snippet:';

  const DEFAULT_CODE = `# Python sandbox — runs for real, right here in the browser.
# Try it:

def fib(n):
    a, b = 0, 1
    for _ in range(n):
        a, b = b, a + b
    return a

print("First 10 Fibonacci numbers:")
print([fib(i) for i in range(10)])
`;

  // Tab key inserts spaces instead of moving focus
  editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart, end = editor.selectionEnd;
      editor.value = editor.value.slice(0, start) + '    ' + editor.value.slice(end);
      editor.selectionStart = editor.selectionEnd = start + 4;
    }
  });

  function setStatus(text, color) {
    statusText.textContent = text;
    statusDot.style.background = color;
  }

  function appendOutput(text, color) {
    const span = document.createElement('span');
    span.textContent = text;
    if (color) span.style.color = color;
    output.appendChild(span);
    output.scrollTop = output.scrollHeight;
  }

  let pyodide = null;
  let autosaveTimer = null;

  async function boot() {
    retryBtn.style.display = 'none';
    setStatus('Booting Python…', '#E8A33D');
    statusDot.style.animation = 'pulse 1.2s ease-in-out infinite';

    try {
      pyodide = await loadPyodide({
        indexURL: "https://cdn.jsdelivr.net/pyodide/v0.26.2/full/"
      });
      pyodide.setStdout({ batched: (s) => appendOutput(s + '\n') });
      pyodide.setStderr({ batched: (s) => appendOutput(s + '\n', '#E07856') });
      setStatus('Ready', '#6FCF8F');
      statusDot.style.animation = 'none';
      runBtn.disabled = false;
    } catch (err) {
      setStatus('Failed to load Python', '#E07856');
      statusDot.style.animation = 'none';
      retryBtn.style.display = 'flex';
      appendOutput('Could not load the Python runtime.\n\nDetails: ' + (err && (err.stack || err.message || err)) + '\n\nCheck your internet connection, then click Retry.', '#E07856');
      console.error('Pyodide load error:', err);
    }
  }

  retryBtn.addEventListener('click', boot);

  async function runCode() {
    if (!pyodide) {
      appendOutput('Python is still starting up — try again in a moment.', '#E8A33D');
      return;
    }
    output.textContent = '';
    execTime.textContent = '';
    runLabel.textContent = 'Running…';
    runBtn.disabled = true;
    setStatus('Running…', '#E8A33D');
    statusDot.style.animation = 'pulse 0.8s ease-in-out infinite';

    const code = editor.value;
    const start = performance.now();
    try {
      let result = await pyodide.runPythonAsync(code);
      const elapsed = Math.round(performance.now() - start);
      execTime.textContent = 'ran in ' + elapsed + 'ms';
      if (result !== undefined && result !== null && output.textContent === '') {
        appendOutput(String(result), '#9A9890');
      }
      setStatus('Ready', '#6FCF8F');
    } catch (err) {
      const elapsed = Math.round(performance.now() - start);
      execTime.textContent = 'failed after ' + elapsed + 'ms';
      appendOutput(String(err.message || err), '#E07856');
      setStatus('Error', '#E07856');
    } finally {
      statusDot.style.animation = 'none';
      runLabel.textContent = 'Run';
      runBtn.disabled = false;
    }
  }

  // Keyboard shortcut: Cmd/Ctrl+Enter to run
  editor.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      runCode();
    }
  });

  runBtn.addEventListener('click', runCode);
  clearBtn.addEventListener('click', () => { output.textContent = ''; execTime.textContent = ''; });

  // --- Persistence (localStorage — this is a standalone page now) ---
  function loadBuffer() {
    try {
      const v = localStorage.getItem(BUFFER_KEY);
      editor.value = v !== null ? v : DEFAULT_CODE;
    } catch {
      editor.value = DEFAULT_CODE;
    }
  }

  function scheduleAutosave() {
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(() => {
      try { localStorage.setItem(BUFFER_KEY, editor.value); } catch {}
    }, 600);
  }
  editor.addEventListener('input', scheduleAutosave);

  function refreshSnippetList() {
    snippetSelect.innerHTML = '<option value="">Saved snippets…</option>';
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(SNIPPET_PREFIX)) {
          const name = k.slice(SNIPPET_PREFIX.length);
          const opt = document.createElement('option');
          opt.value = k;
          opt.textContent = name;
          snippetSelect.appendChild(opt);
        }
      }
    } catch {}
  }

  snippetSelect.addEventListener('change', () => {
    const key = snippetSelect.value;
    deleteBtn.style.display = key ? 'flex' : 'none';
    if (!key) return;
    try {
      const v = localStorage.getItem(key);
      if (v !== null) {
        editor.value = v;
        scheduleAutosave();
      }
    } catch {}
  });

  saveBtn.addEventListener('click', () => {
    const name = prompt('Save this snippet as:');
    if (!name) return;
    try {
      localStorage.setItem(SNIPPET_PREFIX + name, editor.value);
      refreshSnippetList();
      snippetSelect.value = SNIPPET_PREFIX + name;
      deleteBtn.style.display = 'flex';
    } catch {
      appendOutput('Could not save snippet (storage may be full or blocked).', '#E07856');
    }
  });

  deleteBtn.addEventListener('click', () => {
    const key = snippetSelect.value;
    if (!key) return;
    if (!confirm('Delete this saved snippet?')) return;
    try {
      localStorage.removeItem(key);
      refreshSnippetList();
      deleteBtn.style.display = 'none';
    } catch {}
  });

  // --- Init ---
  loadBuffer();
  refreshSnippetList();
  boot();
})();
</script>
</body>
</html>
