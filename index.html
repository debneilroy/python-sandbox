<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python sandbox</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/@tabler/icons-webfont/2.47.0/tabler-icons.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0F1115;
    min-height: 100vh;
    padding: 20px 24px;
    font-family: 'Inter', sans-serif;
  }
  #wrap { width: 100%; max-width: none; margin: 0 auto; }
  #pageTitle {
    color: #E8E6E1;
    font-size: 15px;
    font-weight: 500;
    margin: 0 0 12px 2px;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.35; } }
  textarea:focus, button:focus, select:focus { outline: 2px solid #E8A33D; outline-offset: 1px; }
  .CodeMirror {
    height: 100%;
    width: 100%;
    background: #1A1D23 !important;
    color: #E8E6E1 !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 13.5px !important;
    line-height: 1.6 !important;
  }
  .CodeMirror-scroll {
    width: 100%;
    overflow-x: auto !important;
  }
  .CodeMirror-sizer { min-width: 0 !important; }
  #editorPaneWrap {
    flex: 1 1 0%;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }
  .CodeMirror-gutters { background: #1A1D23 !important; border-right: none !important; }
  .CodeMirror-linenumber { color: #4A4D55 !important; }
  .CodeMirror-cursor { border-left: 2px solid #E8A33D !important; }
  .CodeMirror-selected { background: #3D5A80 !important; }
  .CodeMirror-focused .CodeMirror-selected { background: #3D5A80 !important; }
  .cm-searching, .CodeMirror ::selection { background: #3D5A80 !important; }
  .CodeMirror-line::selection, .CodeMirror-line > span::selection, .CodeMirror-line > span > span::selection {
    background: #3D5A80 !important;
  }
  .CodeMirror-matchingbracket { color: #6FCF8F !important; background: #2A3F33; }
  .cm-keyword { color: #E8A33D !important; }
  .cm-def { color: #7DB8E8 !important; }
  .cm-string, .cm-string-2 { color: #9FCF6F !important; }
  .cm-number { color: #D89FE8 !important; }
  .cm-comment { color: #6E6C66 !important; font-style: italic; }
  .cm-variable { color: #E8E6E1 !important; }
  .cm-operator { color: #C9C7C0 !important; }
  .CodeMirror-hints {
    background: #22262E !important;
    border: 0.5px solid #3A3E47 !important;
    color: #C9C7C0 !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 13px !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4) !important;
  }
  .CodeMirror-hint { padding: 4px 10px !important; }
  li.CodeMirror-hint-active {
    background: #E8A33D !important;
    color: #1A1D23 !important;
  }
  .cm-hint-type { color: #6E6C66; font-size: 11px; float: right; margin-left: 12px; }
  .CodeMirror pre.CodeMirror-line { position: relative; }
  .cm-indent-guide {
    position: absolute;
    top: 0;
    bottom: 0;
    border-left: 1px solid #52586A;
    pointer-events: none;
  }
  @media (max-width: 640px) {
    #splitArea { flex-direction: column; min-height: auto !important; }
    #splitArea > div:first-child { border-right: none !important; border-bottom: 0.5px solid #2E323B !important; min-height: 300px; }
    #splitArea > div:last-child { min-height: 240px; }
  }
</style>
</head>
<body>
<div id="wrap">
  <p id="pageTitle">Python sandbox <span style="color:#6E6C66; font-weight:400;">— runs real CPython in your browser via Pyodide</span></p>

  <div id="root" style="background: #1A1D23; border-radius: 12px; overflow: hidden; border: 0.5px solid #2E323B;">

    <!-- Toolbar -->
    <div style="display:flex; align-items:center; gap:10px; padding:10px 14px; background:#1E2128; border-bottom:0.5px solid #2E323B; flex-wrap:wrap;">
      <button id="runBtn" style="display:flex; align-items:center; gap:6px; background:#E8A33D; color:#1A1D23; border:none; border-radius:6px; padding:7px 14px; font-weight:500; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;">
        <i class="ti ti-player-play" style="font-size:15px;" aria-hidden="true"></i>
        <span id="runLabel">Run</span>
      </button>
      <button id="clearBtn" style="display:flex; align-items:center; gap:6px; background:transparent; color:#9A9890; border:0.5px solid #3A3E47; border-radius:6px; padding:7px 12px; font-weight:500; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;">
        <i class="ti ti-eraser" style="font-size:15px;" aria-hidden="true"></i> Clear output
      </button>

      <div style="width:1px; height:20px; background:#3A3E47; margin:0 2px;"></div>

      <div style="position:relative;">
        <button id="snippetsBtn" style="display:flex; align-items:center; gap:6px; background:#22262E; color:#C9C7C0; border:0.5px solid #3A3E47; border-radius:6px; padding:7px 12px; font-size:13px; font-family:'Inter',sans-serif; cursor:pointer;">
          <i class="ti ti-folder" style="font-size:15px;" aria-hidden="true"></i>
          <span id="snippetsBtnLabel">Saved snippets…</span>
          <i class="ti ti-chevron-down" style="font-size:14px;" aria-hidden="true"></i>
        </button>
        <div id="snippetsPanel" style="display:none; position:absolute; top:100%; left:0; margin-top:4px; width:220px; background:#22262E; border:0.5px solid #3A3E47; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,0.4); z-index:20; overflow:hidden;">
          <input id="snippetSearch" type="text" placeholder="Search snippets…" autocomplete="off" style="width:100%; box-sizing:border-box; background:#1A1D23; color:#E8E6E1; border:none; border-bottom:0.5px solid #3A3E47; padding:8px 10px; font-size:13px; font-family:'Inter',sans-serif; outline:none;">
          <div id="snippetList" style="max-height:220px; overflow-y:auto;"></div>
        </div>
      </div>
      <button id="saveBtn" style="display:flex; align-items:center; gap:6px; background:transparent; color:#9A9890; border:0.5px solid #3A3E47; border-radius:6px; padding:7px 12px; font-weight:500; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;">
        <i class="ti ti-device-floppy" style="font-size:15px;" aria-hidden="true"></i> Save as…
      </button>

      <div style="width:1px; height:20px; background:#3A3E47; margin:0 2px;"></div>

      <div id="timerWrap" style="display:flex; align-items:center; gap:6px;">
        <span id="timerDisplay" style="font-family:'JetBrains Mono', monospace; font-size:13px; color:#9A9890; min-width:52px;">00:00</span>
        <button id="timerToggleBtn" aria-label="Start timer" style="display:flex; align-items:center; justify-content:center; background:transparent; color:#9A9890; border:0.5px solid #3A3E47; border-radius:6px; padding:6px 10px; cursor:pointer; font-size:13px; line-height:1; min-width:30px;">
          <span id="timerToggleIcon" aria-hidden="true">▶</span>
        </button>
        <button id="timerResetBtn" aria-label="Reset timer" style="display:flex; align-items:center; justify-content:center; background:transparent; color:#9A9890; border:0.5px solid #3A3E47; border-radius:6px; padding:6px 10px; cursor:pointer; font-size:13px; line-height:1; min-width:30px;">
          <span aria-hidden="true">↺</span>
        </button>
      </div>

      <div style="flex:1;"></div>

      <div id="statusPill" style="display:flex; align-items:center; gap:6px; font-size:12px; color:#9A9890; font-family:'Inter',sans-serif;">
        <span id="statusDot" style="width:7px; height:7px; border-radius:50%; background:#E8A33D; display:inline-block;"></span>
        <span id="statusText">Booting Python…</span>
        <button id="retryBtn" style="display:none; align-items:center; gap:4px; background:transparent; color:#E8A33D; border:0.5px solid #4A3A1F; border-radius:6px; padding:4px 10px; font-weight:500; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; margin-left:4px;">
          <i class="ti ti-refresh" style="font-size:13px;" aria-hidden="true"></i> Retry
        </button>
      </div>
    </div>

    <!-- Split panes -->
    <div id="splitArea" style="display:flex; min-height:calc(100vh - 130px);">
      <div style="flex:1.3 1 0%; display:flex; flex-direction:column; min-width:0; border-right:0.5px solid #2E323B;">
        <div style="font-size:11px; color:#6E6C66; padding:8px 14px 4px; letter-spacing:0.04em; text-transform:uppercase; font-family:'Inter',sans-serif;">Editor</div>
        <div id="editorPaneWrap">
          <textarea id="editor" spellcheck="false"></textarea>
        </div>
      </div>
      <div style="flex:1 1 0%; display:flex; flex-direction:column; min-width:0;">
        <div style="font-size:11px; color:#6E6C66; padding:8px 14px 4px; letter-spacing:0.04em; text-transform:uppercase; font-family:'Inter',sans-serif; display:flex; justify-content:space-between; align-items:center;">
          <span>Console</span>
          <span id="execTime" style="color:#6E6C66;"></span>
        </div>

        <!-- Single scrolling transcript: past commands/output stay in
             history, and the live >>> input always sits as the last
             line, just like a real terminal. -->
        <div id="output" style="flex:1; padding:8px 14px 14px; font-family:'JetBrains Mono', monospace; font-size:13.5px; line-height:1.6; color:#C9C7C0; overflow:auto; white-space:pre-wrap; word-break:break-word; min-height:0;">
          <div id="replPromptLine" style="display:flex; align-items:center; gap:6px; position:relative;">
            <span style="color:#E8A33D;">&gt;&gt;&gt;</span>
            <input id="replInput" type="text" spellcheck="false" autocomplete="off" placeholder="Waiting for Python to start…" style="flex:1; background:transparent; border:none; outline:none; color:#E8E6E1; font-family:'JetBrains Mono', monospace; font-size:13.5px;">
            <div id="replHints" style="display:none; position:absolute; bottom:100%; left:30px; margin-bottom:4px; background:#22262E; border:0.5px solid #3A3E47; border-radius:6px; box-shadow:0 4px 16px rgba(0,0,0,0.4); max-height:160px; overflow-y:auto; min-width:140px; z-index:10;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <p style="color:#5A584F; font-size:12px; margin:10px 2px 0;">Code autosaves to this browser. Type any command in the console below — build objects, call functions, inspect values. Shortcuts: Cmd/Ctrl+Enter to run, Ctrl+Space for suggestions.</p>
</div>

<script src="./pyodide/pyodide.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/anyword-hint.min.js"></script>
<script>
(function() {
  const editorEl = document.getElementById('editor');
  const output = document.getElementById('output');
  const replPromptLine = document.getElementById('replPromptLine');
  const runBtn = document.getElementById('runBtn');
  const runLabel = document.getElementById('runLabel');
  const clearBtn = document.getElementById('clearBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const execTime = document.getElementById('execTime');
  const snippetsBtn = document.getElementById('snippetsBtn');
  const snippetsBtnLabel = document.getElementById('snippetsBtnLabel');
  const snippetsPanel = document.getElementById('snippetsPanel');
  const snippetSearch = document.getElementById('snippetSearch');
  const snippetList = document.getElementById('snippetList');
  const saveBtn = document.getElementById('saveBtn');
  const retryBtn = document.getElementById('retryBtn');

  const STORAGE_PREFIX = 'pysandbox:';
  const BUFFER_KEY = STORAGE_PREFIX + 'buffer:current';
  const SNIPPET_PREFIX = STORAGE_PREFIX + 'snippet:';

  const DEFAULT_CODE = `# Python sandbox — runs for real, right here in the browser.
# Try it:

def fib(n):
    a, b = 0, 1
    for _ in range(n):
        a, b = b, a + b
    return a

print("First 10 Fibonacci numbers:")
print([fib(i) for i in range(10)])
`;

  // --- Python-aware autocomplete ---
  // CodeMirror 5 ships no official python-hint addon, so we build a small
  // one: a curated list of keywords + builtins, merged with identifiers
  // already typed in the buffer (so your own function/variable names
  // show up too).
  const PY_KEYWORDS = [
    'False','None','True','and','as','assert','async','await','break','class',
    'continue','def','del','elif','else','except','finally','for','from',
    'global','if','import','in','is','lambda','nonlocal','not','or','pass',
    'raise','return','try','while','with','yield'
  ];
  const PY_BUILTINS = [
    'abs','aiter','anext','all','any','ascii','bin','bool','breakpoint',
    'bytearray','bytes','callable','chr','classmethod','compile','complex',
    'delattr','dict','dir','divmod','enumerate','eval','exec','filter',
    'float','format','frozenset','getattr','globals','hasattr','hash',
    'help','hex','id','input','int','isinstance','issubclass','iter','len',
    'list','locals','map','max','min','next','object','oct','open','ord',
    'pow','print','property','range','repr','reversed','round','set',
    'setattr','slice','sorted','staticmethod','str','sum','super','tuple',
    'type','vars','zip','self','__init__','__name__','__main__'
  ];
  const PY_WORDS = PY_KEYWORDS.concat(PY_BUILTINS);

  function pythonHint(cm) {
    const cursor = cm.getCursor();
    const line = cm.getLine(cursor.line);
    let start = cursor.ch, end = cursor.ch;
    while (start && /[\w]/.test(line.charAt(start - 1))) start--;
    while (end < line.length && /[\w]/.test(line.charAt(end))) end++;
    const word = line.slice(start, end);

    if (!word) return null;

    // Pull identifiers already used anywhere in the buffer
    const fullText = cm.getValue();
    const identifierMatches = fullText.match(/[A-Za-z_][A-Za-z0-9_]*/g) || [];
    const userWords = Array.from(new Set(identifierMatches));

    const pool = Array.from(new Set(PY_WORDS.concat(userWords)));
    const matches = pool
      .filter(w => w.toLowerCase().startsWith(word.toLowerCase()) && w !== word)
      .sort((a, b) => {
        // Keywords/builtins first, then alphabetical
        const aIsCore = PY_WORDS.includes(a);
        const bIsCore = PY_WORDS.includes(b);
        if (aIsCore !== bIsCore) return aIsCore ? -1 : 1;
        return a.localeCompare(b);
      });

    if (!matches.length) return null;

    return {
      list: matches,
      from: CodeMirror.Pos(cursor.line, start),
      to: CodeMirror.Pos(cursor.line, end)
    };
  }

  // CodeMirror: real syntax highlighting, auto-indent after colons,
  // smart dedent, matching/auto-closing brackets — everything a plain
  // textarea can't do.
  const editor = CodeMirror.fromTextArea(editorEl, {
    mode: 'python',
    theme: 'dracula',
    lineNumbers: true,
    indentUnit: 4,
    tabSize: 4,
    indentWithTabs: false,
    smartIndent: true,
    electricChars: true,
    matchBrackets: true,
    autoCloseBrackets: true,
    styleActiveLine: true,
    hintOptions: { hint: pythonHint, completeSingle: false },
    extraKeys: {
      'Tab': function(cm) {
        // Insert 4 spaces instead of a literal tab character
        cm.replaceSelection('    ', 'end');
      },
      'Shift-Tab': 'indentLess',
      'Backspace': function(cm) {
        // If the cursor is inside leading whitespace, delete a full
        // 4-space indent level instead of one space at a time —
        // otherwise dedenting out of a nested block means holding
        // Backspace through every individual space.
        if (cm.somethingSelected()) {
          cm.replaceSelection('', 'around');
          return;
        }
        const cursor = cm.getCursor();
        const line = cm.getLine(cursor.line);
        const beforeCursor = line.slice(0, cursor.ch);
        const isAllWhitespace = /^\s*$/.test(beforeCursor);

        if (isAllWhitespace && cursor.ch > 0) {
          const deleteCount = ((cursor.ch - 1) % 4) + 1;
          cm.replaceRange(
            '',
            CodeMirror.Pos(cursor.line, cursor.ch - deleteCount),
            CodeMirror.Pos(cursor.line, cursor.ch)
          );
        } else {
          cm.execCommand('delCharBefore');
        }
      },
      'Cmd-Enter': function() { runCode(); },
      'Ctrl-Enter': function() { runCode(); },
      'Ctrl-Space': function(cm) { cm.showHint(); }
    }
  });

  // Auto-trigger suggestions while typing a word (not after every
  // keystroke — only when there's a real word being built, and skip
  // it right after autocomplete just inserted something).
  editor.on('inputRead', function(cm, change) {
    if (change.origin !== '+input') return;
    const cursor = cm.getCursor();
    const line = cm.getLine(cursor.line);
    const charBefore = line.charAt(cursor.ch - 1);
    if (!/[\w]/.test(charBefore)) return;
    // Find how long the current word is so far
    let start = cursor.ch;
    while (start && /[\w]/.test(line.charAt(start - 1))) start--;
    if (cursor.ch - start < 2) return; // wait for at least 2 characters
    cm.showHint({ hint: pythonHint, completeSingle: false });
  });

  // --- Indent guides ---
  // Draws a faint vertical line at each indentation level so nested
  // for/if/def blocks are easy to trace visually. CodeMirror has no
  // built-in option for this, so we hook the renderLine event and add
  // one absolutely-positioned div per indent level.
  //
  // Performance note: this runs on every line render, including ones
  // triggered by normal typing, so it's kept as cheap as possible —
  // char width is measured once and cached (it's a font metric, not
  // per-line data), and we skip the DOM cleanup query entirely when a
  // line has no guides to remove.
  let cachedCharWidth = null;
  editor.on('renderLine', function(cm, line, el) {
    if (cachedCharWidth === null) cachedCharWidth = cm.defaultCharWidth();

    const text = line.text;
    const leadingSpaces = (text.match(/^ */) || [''])[0].length;
    const indentLevels = Math.floor(leadingSpaces / 4);

    if (el.dataset.hasGuides === '1') {
      el.querySelectorAll('.cm-indent-guide').forEach(n => n.remove());
      delete el.dataset.hasGuides;
    }
    if (indentLevels < 1) return;

    const frag = document.createDocumentFragment();
    for (let lvl = 1; lvl <= indentLevels; lvl++) {
      const guide = document.createElement('div');
      guide.className = 'cm-indent-guide';
      guide.style.left = (lvl * 4 * cachedCharWidth) + 'px';
      frag.appendChild(guide);
    }
    el.appendChild(frag);
    el.dataset.hasGuides = '1';
  });

  // Note: renderLine fires automatically whenever a line's content or
  // visible state changes, so no manual refresh-on-every-keystroke is
  // needed here — that would be expensive and cause visible flicker.

  function setStatus(text, color) {
    statusText.textContent = text;
    statusDot.style.background = color;
  }

  function scrollOutputToBottom() {
    // Wait a frame so scrollHeight reflects the just-appended content;
    // reading it synchronously right after appendChild can race ahead
    // of layout, especially when many lines are appended back-to-back
    // (e.g. a multi-line paste).
    requestAnimationFrame(() => {
      output.scrollTop = output.scrollHeight;
    });
  }

  function clearOutput() {
    // Remove every child except the live prompt line, which must
    // always remain the last element in the transcript.
    Array.from(output.children).forEach(child => {
      if (child !== replPromptLine) child.remove();
    });
  }

  function appendOutput(text, color) {
    const line = document.createElement('div');
    line.textContent = text;
    if (color) line.style.color = color;
    output.insertBefore(line, replPromptLine);
    scrollOutputToBottom();
  }

  let pyodide = null;
  let autosaveTimer = null;
  let runProducedOutput = false;

  async function boot() {
    retryBtn.style.display = 'none';
    setStatus('Booting Python…', '#E8A33D');
    statusDot.style.animation = 'pulse 1.2s ease-in-out infinite';

    try {
      pyodide = await loadPyodide({
        indexURL: "./pyodide/"
      });
      pyodide.setStdout({ batched: (s) => { runProducedOutput = true; appendOutput(s + '\n'); } });
      pyodide.setStderr({ batched: (s) => { runProducedOutput = true; appendOutput(s + '\n', '#E07856'); } });
      setStatus('Ready', '#6FCF8F');
      statusDot.style.animation = 'none';
      runBtn.disabled = false;
      replInput.placeholder = 'Type Python and press Enter…';
    } catch (err) {
      setStatus('Failed to load Python', '#E07856');
      statusDot.style.animation = 'none';
      retryBtn.style.display = 'flex';
      appendOutput('Could not load the Python runtime.\n\nDetails: ' + (err && (err.stack || err.message || err)) + '\n\nThe pyodide/ folder may be missing a file. Click Retry, or re-check that all 5 files were uploaded to the pyodide/ folder.', '#E07856');
      console.error('Pyodide load error:', err);
    }
  }

  retryBtn.addEventListener('click', boot);

  async function runCode() {
    if (!pyodide) {
      appendOutput('Python is still starting up — try again in a moment.', '#E8A33D');
      return;
    }
    clearOutput();
    execTime.textContent = '';
    runLabel.textContent = 'Running…';
    runBtn.disabled = true;
    setStatus('Running…', '#E8A33D');
    statusDot.style.animation = 'pulse 0.8s ease-in-out infinite';

    const code = editor.getValue();
    const start = performance.now();
    runProducedOutput = false;
    try {
      let result = await pyodide.runPythonAsync(code);
      const elapsed = Math.round(performance.now() - start);
      execTime.textContent = 'ran in ' + elapsed + 'ms';
      if (result !== undefined && result !== null && !runProducedOutput) {
        appendOutput(String(result), '#9A9890');
      }
      setStatus('Ready', '#6FCF8F');
    } catch (err) {
      const elapsed = Math.round(performance.now() - start);
      execTime.textContent = 'failed after ' + elapsed + 'ms';
      appendOutput(String(err.message || err), '#E07856');
      setStatus('Error', '#E07856');
    } finally {
      statusDot.style.animation = 'none';
      runLabel.textContent = 'Run';
      runBtn.disabled = false;
    }
  }

  runBtn.addEventListener('click', runCode);
  clearBtn.addEventListener('click', () => { clearOutput(); execTime.textContent = ''; });

  // --- Interactive REPL ---
  // Lets you type Python directly into the console and run it against
  // the same Pyodide namespace the Run button uses — so anything you
  // defined by running the editor (classes, variables, functions) is
  // still available here. Unlike Run, this never clears prior output.
  const replInput = document.getElementById('replInput');
  const replHistory = [];
  let replHistoryIndex = -1;

  function appendReplLine(text, color) {
    const line = document.createElement('div');
    const prompt = document.createElement('span');
    prompt.textContent = '>>> ';
    prompt.style.color = '#E8A33D';
    line.appendChild(prompt);
    const rest = document.createElement('span');
    rest.textContent = text;
    if (color) rest.style.color = color;
    line.appendChild(rest);
    output.insertBefore(line, replPromptLine);
    scrollOutputToBottom();
  }

  async function runReplLine(line) {
    if (!pyodide) {
      appendOutput('Python is still starting up — try again in a moment.', '#E8A33D');
      return;
    }
    appendReplLine(line);

    const trimmed = line.trim();
    const isAssert = /^assert\s+/.test(trimmed);

    try {
      if (isAssert) {
        // Run as a boolean check instead of a literal assert, so a
        // failure shows a clean ✗ here too, instead of a raw
        // AssertionError traceback.
        const checkExpr = trimmed.replace(/^assert\s+/, '');
        const passed = await pyodide.runPythonAsync(`bool(${checkExpr})`);
        if (passed) {
          appendOutput('✓ Passed', '#6FCF8F');
        } else {
          appendOutput('✗ Failed', '#E07856');
        }
      } else {
        const result = await pyodide.runPythonAsync(line);
        if (result !== undefined && result !== null) {
          appendOutput(String(result), '#9A9890');
        }
      }
    } catch (err) {
      appendOutput(String(err.message || err), '#E07856');
    }
    scrollOutputToBottom();
  }

  // --- Console autocomplete ---
  // A lightweight word-completion dropdown for the plain <input>, since
  // CodeMirror's hint API only works on CodeMirror instances. Reuses
  // the same keyword/builtin list as the editor, plus identifiers
  // found in the editor buffer and REPL history.
  const replHints = document.getElementById('replHints');
  let replSuggestions = [];
  let replSuggestionIndex = -1;

  function getReplCurrentWord() {
    const val = replInput.value;
    const caret = replInput.selectionStart;
    let start = caret;
    while (start > 0 && /[\w]/.test(val.charAt(start - 1))) start--;
    return { word: val.slice(start, caret), start, end: caret };
  }

  function hideReplHints() {
    replHints.style.display = 'none';
    replHints.innerHTML = '';
    replSuggestions = [];
    replSuggestionIndex = -1;
  }

  function renderReplHints() {
    replHints.innerHTML = '';
    replSuggestions.forEach((word, i) => {
      const item = document.createElement('div');
      item.textContent = word;
      item.style.padding = '4px 10px';
      item.style.cursor = 'pointer';
      item.style.fontFamily = "'JetBrains Mono', monospace";
      item.style.fontSize = '13px';
      item.style.color = '#C9C7C0';
      if (i === replSuggestionIndex) {
        item.style.background = '#E8A33D';
        item.style.color = '#1A1D23';
      }
      item.addEventListener('mousedown', (e) => {
        e.preventDefault(); // keep focus on the input
        applyReplSuggestion(word);
      });
      replHints.appendChild(item);
    });
    replHints.style.display = replSuggestions.length ? 'block' : 'none';
  }

  function applyReplSuggestion(word) {
    const { start, end } = getReplCurrentWord();
    const val = replInput.value;
    replInput.value = val.slice(0, start) + word + val.slice(end);
    const newCaret = start + word.length;
    replInput.setSelectionRange(newCaret, newCaret);
    hideReplHints();
  }

  function updateReplHints() {
    const { word } = getReplCurrentWord();
    if (word.length < 2) {
      hideReplHints();
      return;
    }
    // Pull identifiers from the editor buffer too, so functions/classes
    // you defined there show up while typing in the console.
    const bufferText = editor.getValue();
    const identifierMatches = bufferText.match(/[A-Za-z_][A-Za-z0-9_]*/g) || [];
    const pool = Array.from(new Set(PY_WORDS.concat(identifierMatches)));
    replSuggestions = pool
      .filter(w => w.toLowerCase().startsWith(word.toLowerCase()) && w !== word)
      .sort((a, b) => {
        const aCore = PY_WORDS.includes(a), bCore = PY_WORDS.includes(b);
        if (aCore !== bCore) return aCore ? -1 : 1;
        return a.localeCompare(b);
      })
      .slice(0, 10);
    replSuggestionIndex = replSuggestions.length ? 0 : -1;
    renderReplHints();
  }

  replInput.addEventListener('input', updateReplHints);

  replInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const line = replInput.value;
      if (!line.trim()) return;
      if (replSuggestions.length) {
        // Enter with an open dropdown accepts the highlighted
        // suggestion instead of running the line — matches the
        // editor's autocomplete behavior.
        applyReplSuggestion(replSuggestions[replSuggestionIndex]);
        return;
      }
      replHistory.push(line);
      replHistoryIndex = replHistory.length;
      replInput.value = '';
      runReplLine(line);
    } else if (e.key === 'ArrowUp') {
      if (replSuggestions.length) {
        e.preventDefault();
        replSuggestionIndex = Math.max(0, replSuggestionIndex - 1);
        renderReplHints();
        return;
      }
      if (replHistory.length === 0) return;
      e.preventDefault();
      replHistoryIndex = Math.max(0, replHistoryIndex - 1);
      replInput.value = replHistory[replHistoryIndex] || '';
    } else if (e.key === 'ArrowDown') {
      if (replSuggestions.length) {
        e.preventDefault();
        replSuggestionIndex = Math.min(replSuggestions.length - 1, replSuggestionIndex + 1);
        renderReplHints();
        return;
      }
      if (replHistory.length === 0) return;
      e.preventDefault();
      replHistoryIndex = Math.min(replHistory.length, replHistoryIndex + 1);
      replInput.value = replHistory[replHistoryIndex] || '';
    } else if (e.key === 'Escape') {
      hideReplHints();
    } else if (e.key === 'Tab' && replSuggestions.length) {
      e.preventDefault();
      applyReplSuggestion(replSuggestions[replSuggestionIndex]);
    }
  });

  // Pasting multiple lines at once (e.g. several tree-setup statements)
  // would otherwise land as one squashed line and fail with a syntax
  // error. Instead, split on newlines and run each line in sequence,
  // exactly as if it had been typed and Enter pressed individually.
  replInput.addEventListener('paste', (e) => {
    const text = e.clipboardData.getData('text');
    if (!text.includes('\n')) return; // single line: let default paste happen

    e.preventDefault();
    hideReplHints();
    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    (async () => {
      for (const line of lines) {
        replHistory.push(line);
        replHistoryIndex = replHistory.length;
        await runReplLine(line);
      }
    })();
  });

  // --- Persistence (localStorage — this is a standalone page now) ---
  function loadBuffer() {
    try {
      const v = localStorage.getItem(BUFFER_KEY);
      editor.setValue(v !== null ? v : DEFAULT_CODE);
    } catch {
      editor.setValue(DEFAULT_CODE);
    }
  }

  function scheduleAutosave() {
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(() => {
      try { localStorage.setItem(BUFFER_KEY, editor.getValue()); } catch {}
    }, 600);
  }
  editor.on('change', scheduleAutosave);

  // --- Snippets: searchable list panel ---
  let allSnippetNames = [];
  let currentSnippetName = null;

  function loadAllSnippetNames() {
    allSnippetNames = [];
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(SNIPPET_PREFIX)) {
          allSnippetNames.push(k.slice(SNIPPET_PREFIX.length));
        }
      }
      allSnippetNames.sort((a, b) => a.localeCompare(b));
    } catch {}
  }

  function renderSnippetList(filterText) {
    const query = (filterText || '').toLowerCase();
    const matches = allSnippetNames.filter(name => name.toLowerCase().includes(query));
    snippetList.innerHTML = '';

    if (!matches.length) {
      const empty = document.createElement('div');
      empty.textContent = allSnippetNames.length ? 'No matches' : 'No saved snippets yet';
      empty.style.padding = '10px';
      empty.style.fontSize = '13px';
      empty.style.color = '#6E6C66';
      empty.style.fontFamily = "'Inter',sans-serif";
      snippetList.appendChild(empty);
      return;
    }

    matches.forEach(name => {
      const row = document.createElement('div');
      row.style.display = 'flex';
      row.style.alignItems = 'center';
      row.style.justifyContent = 'space-between';
      row.style.padding = '7px 10px';
      row.style.cursor = 'pointer';
      row.style.fontSize = '13px';
      row.style.fontFamily = "'Inter',sans-serif";
      row.style.color = '#C9C7C0';
      row.addEventListener('mouseenter', () => { row.style.background = '#2A2E37'; });
      row.addEventListener('mouseleave', () => { row.style.background = 'transparent'; });

      const label = document.createElement('span');
      label.textContent = name;
      label.style.overflow = 'hidden';
      label.style.textOverflow = 'ellipsis';
      label.style.whiteSpace = 'nowrap';
      row.appendChild(label);

      const del = document.createElement('i');
      del.className = 'ti ti-trash';
      del.style.fontSize = '14px';
      del.style.color = '#9A9890';
      del.style.flexShrink = '0';
      del.style.marginLeft = '8px';
      del.addEventListener('mouseenter', () => { del.style.color = '#E07856'; });
      del.addEventListener('mouseleave', () => { del.style.color = '#9A9890'; });
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!confirm('Delete "' + name + '"?')) return;
        try { localStorage.removeItem(SNIPPET_PREFIX + name); } catch {}
        if (currentSnippetName === name) {
          currentSnippetName = null;
          snippetsBtnLabel.textContent = 'Saved snippets…';
        }
        loadAllSnippetNames();
        renderSnippetList(snippetSearch.value);
      });
      row.appendChild(del);

      row.addEventListener('click', () => {
        try {
          const v = localStorage.getItem(SNIPPET_PREFIX + name);
          if (v !== null) {
            editor.setValue(v);
            scheduleAutosave();
            currentSnippetName = name;
            snippetsBtnLabel.textContent = name;
          }
        } catch {}
        closeSnippetsPanel();
      });

      snippetList.appendChild(row);
    });
  }

  function openSnippetsPanel() {
    loadAllSnippetNames();
    snippetSearch.value = '';
    renderSnippetList('');
    snippetsPanel.style.display = 'block';
    snippetSearch.focus();
  }

  function closeSnippetsPanel() {
    snippetsPanel.style.display = 'none';
  }

  snippetsBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (snippetsPanel.style.display === 'block') {
      closeSnippetsPanel();
    } else {
      openSnippetsPanel();
    }
  });

  snippetSearch.addEventListener('input', () => renderSnippetList(snippetSearch.value));
  snippetSearch.addEventListener('click', (e) => e.stopPropagation());

  document.addEventListener('click', (e) => {
    if (!snippetsPanel.contains(e.target) && e.target !== snippetsBtn) {
      closeSnippetsPanel();
    }
  });

  saveBtn.addEventListener('click', () => {
    const name = prompt('Save this snippet as:');
    if (!name) return;
    try {
      localStorage.setItem(SNIPPET_PREFIX + name, editor.getValue());
      currentSnippetName = name;
      snippetsBtnLabel.textContent = name;
    } catch {
      appendOutput('Could not save snippet (storage may be full or blocked).', '#E07856');
    }
  });

  // --- Timer ---
  const timerDisplay = document.getElementById('timerDisplay');
  const timerToggleBtn = document.getElementById('timerToggleBtn');
  const timerToggleIcon = document.getElementById('timerToggleIcon');
  const timerResetBtn = document.getElementById('timerResetBtn');
  let timerSeconds = 0;
  let timerInterval = null;
  let timerRunning = false;

  function formatTime(totalSeconds) {
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function updateTimerDisplay() {
    timerDisplay.textContent = formatTime(timerSeconds);
  }

  function toggleTimer() {
    if (timerRunning) {
      clearInterval(timerInterval);
      timerRunning = false;
      timerToggleIcon.textContent = '▶';
      timerToggleBtn.setAttribute('aria-label', 'Start timer');
    } else {
      timerInterval = setInterval(() => {
        timerSeconds++;
        updateTimerDisplay();
      }, 1000);
      timerRunning = true;
      timerToggleIcon.textContent = '❘❘';
      timerToggleBtn.setAttribute('aria-label', 'Pause timer');
    }
  }

  timerToggleBtn.addEventListener('click', toggleTimer);
  timerResetBtn.addEventListener('click', () => {
    clearInterval(timerInterval);
    timerRunning = false;
    timerSeconds = 0;
    timerToggleIcon.textContent = '▶';
    timerToggleBtn.setAttribute('aria-label', 'Start timer');
    updateTimerDisplay();
  });

  // --- Init ---
  loadBuffer();
  boot();
  editor.refresh();
  window.addEventListener('resize', () => editor.refresh());
})();
</script>
</body>
</html>
